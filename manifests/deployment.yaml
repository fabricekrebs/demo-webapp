apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-webapp
  namespace: demo-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-webapp
  template:
    metadata:
      labels:
        app: demo-webapp
    spec:
      containers:
        - name: demo-webapp
          image: acritalynorth01.azurecr.io/demo-webapp:latest # Replace with your image
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: demo-webapp-env
